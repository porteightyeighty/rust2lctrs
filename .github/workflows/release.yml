name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: ./mvnw -q clean package -DskipTests
      - uses: softprops/action-gh-release@v2
        with:
          files: target/rust2lctrs-*.jar
          body: 'Run: java -jar rust2lctrs-*.jar <input.rs>  (needs Java 25)'
